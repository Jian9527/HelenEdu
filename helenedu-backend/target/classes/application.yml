server:
  port: 8888
  servlet:
    context-path: /

# 日志配置
logging:
  file:
    name: ../logs/helenedu-backend.log
  level:
    root: info
    com.helen.eduedu: debug
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/helen_edu?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: helenedu
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: HelenEduSecretKey2024ForJwtTokenGenerationMustBeLongEnough
  expiration: 604800000  # 7天，单位毫秒

# 微信小程序配置
wechat:
  appid: your-appid
  secret: your-secret

# 文件上传配置
file:
  upload-dir: ${user.dir}/uploads
  base-url: http://localhost:8888/uploads

# Knife4j 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn
